<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drop & Go Water</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="main-title">Drop & Go Water</h1>

<div class="water-info">
  <h2>Quarterly Subscription 🔁</h2>

  <!-- PAYMENT DISPLAY -->
  <div class="payment-display">
    <p id="first-payment">Fill in your details to see your price</p>
    <p id="recurring-payment"></p>
  </div>

  <div class="container">
    <div class="card highlight">

      <!-- FORM -->
      <form id="payment-form">

        <select id="residence" class="form-input" required>
          <option value="">Select Residence</option>
          <option value="dagbreek">Dagbreek</option>
          <option value="irene">Irene</option>
        </select>

        <input type="text" id="section-room" class="form-input" placeholder="Section & Room Number" required>
        <input type="text" id="name" class="form-input" placeholder="Name & Surname" required>
        <input type="text" id="phone" class="form-input" placeholder="Phone Number" required>

        <button type="submit" class="btn-payfast">
          Subscribe with PayFast
        </button>

      </form>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
