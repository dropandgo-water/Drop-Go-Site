<!-- Subscription Card — Quarterly only -->
<div class="card">
  <h2>Quarterly subscription 🔁</h2>
  
  <!-- Residence selection -->
  <label for="residence">Select your residence:</label>
  <select id="residence" name="residence" required>
    <option value="">--Choose--</option>
    <option value="dagbreek">Dagbreek</option>
    <option value="irene">Irene</option>
  </select>
  
  <!-- Dynamic price display -->
  <p id="display-price">Price: R50 – R550</p>
  
  <form id="subscription-form" action="https://www.payfast.co.za/eng/process" method="post">
    <input type="hidden" name="cmd" value="_paynow">
    <input type="hidden" name="receiver" value="21742448">
    <input type="hidden" name="amount" value="0" id="pf-amount">
    <input type="hidden" name="item_name" value="Drop&Go Quarterly Subscription">
    <input type="hidden" name="subscription_type" value="1">
    <input type="hidden" name="recurring_amount" value="0" id="pf-recurring">
    <input type="hidden" name="frequency" value="4">
    <input type="hidden" name="cycles" value="0">

    <input class="form-input" type="text" name="name_first" placeholder="Name_Surname" required>
    <input class="form-input" type="text" name="custom_str1" placeholder="Residence_Section_RoomNr" required>
    <input class="form-input" type="tel" name="cell_number" placeholder="Phone Number" required>

    <input class="form-input" type="image" src="https://my.payfast.io/images/buttons/Subscribe/Primary-Large-Subscribe.png" alt="Subscribe Quarterly with PayFast">
  </form>
  <p class="secure-payment">Secure payment via PayFast</p>
</div>
