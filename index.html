<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop & Go Water</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="main-title">Drop & Go Water</h1>

<div class="water-info">
  <h2>Sign Up for Your Termly Subscription</h2>
  
  <div class="form-section">
    <label for="residence">Residence</label>
    <select id="residence" class="form-input">
      <option value="">Select Residence</option>
      <option value="Dagbreek">Dagbreek</option>
      <option value="Irene">Irene</option>
    </select>

    <label for="sectionRoom">Section & Room Number</label>
    <input type="text" id="sectionRoom" class="form-input">

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" class="form-input">

    <label for="phoneNumber">Phone Number</label>
    <input type="text" id="phoneNumber" class="form-input">

    <div id="paymentDisplay">
      <p><strong>Initial Payment:</strong> <span id="firstPayment">-</span></p>
      <p><strong>Recurring Payment:</strong> <span id="recurringPayment">-</span></p>
      <p>Fill in your details to see exact payment amounts.</p>
    </div>

    <button id="subscribeBtn" class="btn-whatsapp">Subscribe with PayFast</button>
  </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
