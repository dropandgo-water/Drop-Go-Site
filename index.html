<div class="card highlight">
  <h3>Quarterly Subscription</h3>

  <!-- Payment Display -->
  <div class="payment-display">
    <p id="first-payment">First Payment: - / term</p>
    <p id="recurring-payment">Recurring Payment: - / term</p>
  </div>

  <!-- Form -->
  <select id="residence" class="form-input">
    <option value="">Select Residence</option>
    <option value="dagbreek">Dagbreek</option>
    <option value="irene">Irene</option>
  </select>

  <input type="text" id="section-room" class="form-input" placeholder="Section & Room Number">
  <input type="text" id="name-surname" class="form-input" placeholder="Name & Surname">
  <input type="text" id="phone" class="form-input" placeholder="Phone Number">

  <!-- Modern PayFast Button -->
  <button id="subscribe-btn" class="btn-payfast">
    Subscribe with PayFast
  </button>
</div>
