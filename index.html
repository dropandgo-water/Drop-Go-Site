<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drop&Go Water</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="main-title">Drop&Go Water 💧</h1>

<div class="card">

  <h2>Quarterly Subscription</h2>

  <!-- PRICE DISPLAY -->
  <div id="price-box">
    <p id="price-text">Fill in your details to see your price</p>
    <p id="recurring-text"></p>
  </div>

  <!-- INPUTS -->
  <select id="residence" class="form-input">
    <option value="">Select Residence</option>
    <option value="Dagbreek">Dagbreek</option>
    <option value="Irene">Irene</option>
  </select>

  <input id="room" class="form-input" placeholder="Section & Room Number">
  <input id="name" class="form-input" placeholder="Name & Surname">
  <input id="phone" class="form-input" placeholder="Phone Number">

  <!-- PAYFAST -->
  <form action="https://www.payfast.co.za/eng/process" method="post">

    <input type="hidden" name="cmd" value="_paynow">
    <input type="hidden" name="receiver" value="21742448">

    <input type="hidden" name="item_name" value="Drop&Go Water Subscription">

    <!-- Dynamic -->
    <input type="hidden" name="amount" id="payfast-amount">
    <input type="hidden" name="recurring_amount" id="payfast-recurring">

    <!-- Customer Data -->
    <input type="hidden" name="name_first" id="pf-name">
    <input type="hidden" name="cell_number" id="pf-phone">
    <input type="hidden" name="custom_str1" id="pf-residence">
    <input type="hidden" name="custom_str2" id="pf-room">

    <!-- BUTTON -->
    <input type="image"
      src="https://my.payfast.io/images/buttons/Subscribe/Primary-Large-Subscribe.png"
      class="payfast-btn">

  </form>

</div>

<script src="script.js"></script>

</body>
</html>
